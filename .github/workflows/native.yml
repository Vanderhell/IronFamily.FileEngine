name: Native C Build & Test

on:
  push:
    branches: [ main, develop, "feat/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-native-linux:
    name: Build C99 Native (Linux)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake make build-essential

    - name: Configure
      run: |
        cmake -S native -B out/native/linux-debug \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    - name: Build
      run: cmake --build out/native/linux-debug

    - name: Test
      run: |
        cd out/native/linux-debug
        ctest --output-on-failure || ./tests/ironfamily_c_tests
      continue-on-error: false

    - name: Upload CTest Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: ctest-results
        path: out/native/linux-debug/Testing/

  build-native-windows:
    name: Build C99 Native (Windows)
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure
      run: |
        cmake -S native -B out\native\windows-debug `
          -DCMAKE_BUILD_TYPE=Debug

    - name: Build
      run: cmake --build out\native\windows-debug --config Debug

    - name: Test
      run: |
        .\out\native\windows-debug\tests\Debug\ironfamily_c_tests.exe

    - name: Upload Build Artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: native-windows-build
        path: out/native/windows-debug/
